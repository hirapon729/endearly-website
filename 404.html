<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Not found — Endearly</title>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F7F2E8" />

<link rel="icon" type="image/png" sizes="180x180" href="/assets/icon-180.png" />
<style>

  html,body{height:100%;}
  body{ margin:0; background:var(--paper); color:var(--ink);
    font-family:system-ui,-apple-system,sans-serif; display:grid; place-items:center; text-align:center; padding:2rem; }
  h1{ font-family:ui-serif,"New York",Georgia,serif; font-weight:600; font-size:clamp(1.6rem,4vw,2.4rem); margin:0 0 .5rem; }
  p{ color:var(--ink-soft); margin:0 0 1.5rem; }
  a{ color:var(--sage); font-weight:600; text-decoration:none; }
  a:focus-visible{ outline:2px solid var(--sage); outline-offset:3px; border-radius:4px; }
</style>
</head>

  <div>
    <h1>This page slipped our memory.</h1>
